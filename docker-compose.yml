# MLKD Portal — вся система одной командой: docker compose up
#
# Для локальной разработки чаще удобнее поднять только БД:
#   docker compose up -d db
# и запускать web (pnpm dev) и ai (uvicorn) на хосте — см. README.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlkd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlkd}
      POSTGRES_DB: ${POSTGRES_DB:-mlkd}
    ports:
      # только localhost: наружу БД не выставляем
      - '127.0.0.1:5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
      # Seed the DB on FIRST init (empty volume): 252 publications + embeddings +
      # topic map + admin user. Postgres runs *.sql.gz in this dir automatically,
      # so a fresh `docker compose up` gives everyone a working site with data.
      - ./db/seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mlkd}']
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mlkd}:${POSTGRES_PASSWORD:-mlkd}@db:5432/${POSTGRES_DB:-mlkd}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?set PAYLOAD_SECRET in .env}
      # Reach the AI service (search/chat/import/maintenance) inside the network.
      AI_SERVICE_URL: http://ai:8000
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-}
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

  ai:
    build: ./ai
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mlkd}:${POSTGRES_PASSWORD:-mlkd}@db:5432/${POSTGRES_DB:-mlkd}
      PAYLOAD_URL: http://web:3000
      PAYLOAD_API_KEY: ${PAYLOAD_API_KEY:-}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1200}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-true}
      LLM_FALLBACK_PROVIDERS: ${LLM_FALLBACK_PROVIDERS:-gemini,openrouter,ollama}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash-lite}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-MLKD Intelligent Research Platform}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      RAG_MAX_SOURCES: ${RAG_MAX_SOURCES:-8}
      RAG_MAX_QUESTION_CHARS: ${RAG_MAX_QUESTION_CHARS:-500}
      RAG_MAX_CONTEXT_CHARS: ${RAG_MAX_CONTEXT_CHARS:-12000}
      RAG_TIMEOUT_SECONDS: ${RAG_TIMEOUT_SECONDS:-60}
      RAG_MIN_EVIDENCE_SOURCES: ${RAG_MIN_EVIDENCE_SOURCES:-2}
      RAG_MIN_SOURCE_SCORE: ${RAG_MIN_SOURCE_SCORE:-0.05}
      RAG_MIN_SEMANTIC_SCORE: ${RAG_MIN_SEMANTIC_SCORE:-0.25}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      OPENALEX_MAILTO: ${OPENALEX_MAILTO:-mlkd-portal@example.com}
    ports:
      # только localhost: /generate/* защищён токеном, но наружу сервис не нужен
      - '127.0.0.1:8000:8000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
